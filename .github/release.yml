changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking-change
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🏗️ Infrastructure"
      labels:
        - infrastructure
        - ci
        - cd
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "Other Changes"
      labels:
        - "*"
