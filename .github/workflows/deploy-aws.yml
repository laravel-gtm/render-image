name: Deploy to AWS

on:
  workflow_run:
    workflows:
      - Publish Docker Image
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Full git SHA of the image already published to GHCR (same tag as ghcr.io/.../render-image)
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  packages: read

concurrency:
  group: deploy-aws-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository)
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
    steps:
      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: GHCR image name
        run: |
          echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/render-image" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names render-image --region "$AWS_REGION" \
            || aws ecr create-repository --repository-name render-image --region "$AWS_REGION"

      - name: Pull from GHCR and push to Amazon ECR
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker pull "$GHCR_IMAGE:$IMAGE_TAG"
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/render-image"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          docker tag "$GHCR_IMAGE:$IMAGE_TAG" "$ECR_URI:$IMAGE_TAG"
          docker push "$ECR_URI:$IMAGE_TAG"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install CDK app dependencies
        working-directory: infrastructure
        run: uv sync

      - name: CDK deploy
        working-directory: infrastructure
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          npx aws-cdk@^2 deploy --require-approval never \
            -c usePrebuiltImage=true \
            -c "imageTag=${IMAGE_TAG}"
